name: CI

on:
    pull_request:
    push:

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm lint

            - name: Lint fix
              run: pnpm lint:fix

            - name: Format
              run: pnpm format

            - name: Check
              run: pnpm check

            - name: Build
              run: pnpm build

            - name: Test
              run: pnpm test
